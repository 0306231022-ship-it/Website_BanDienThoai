<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản Phẩm Mới Nhập - Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fbfbfd] text-slate-900">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <button onclick="history.back()" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 hover:text-red-600 transition-all">
                <i class="fas fa-arrow-left"></i> Quay lại
            </button>
            <div class="flex items-center gap-3">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                <h1 class="font-black text-sm tracking-[0.3em] uppercase">Mới nhập kho</h1>
            </div>
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hidden md:block">
                Cập nhật: <span class="text-slate-900">19/03/2026</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <div class="mb-12 border-l-4 border-red-600 pl-6">
            <h2 class="text-3xl md:text-4xl font-black uppercase tracking-tighter italic">Danh mục hàng mới</h2>
            <p class="text-slate-500 text-sm font-medium mt-1">Hiển thị các thiết kế mới nhất vừa có mặt tại hệ thống.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-10">
            
            <div class="group cursor-pointer">
                <div class="relative aspect-[4/5] bg-white rounded-[2rem] border border-gray-100 flex items-center justify-center p-10 overflow-hidden transition-all duration-500 group-hover:shadow-[0_30px_60px_-15px_rgba(0,0,0,0.1)] group-hover:-translate-y-2">
                    <div class="absolute top-5 right-5 z-10 bg-red-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">
                        New
                    </div>
                    <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-1inch-blue-titanium?wid=512&hei=512&fmt=webp&qlt=70&.v=1692846548018" 
                         class="w-full h-full object-contain transition-transform duration-700 group-hover:scale-110" alt="iPhone 15 Pro">
                    
                    <div class="absolute inset-0 bg-slate-900/5 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                        <button class="w-full bg-white text-slate-900 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-2xl transform translate-y-4 group-hover:translate-y-0 transition-transform">
                            Xem chi tiết
                        </button>
                    </div>
                </div>

                <div class="mt-6 px-2 text-center sm:text-left">
                    <p class="text-[10px] font-black text-red-600 uppercase tracking-widest mb-1">Apple</p>
                    <h3 class="font-black text-slate-800 text-base uppercase leading-tight mb-2 group-hover:text-red-600 transition-colors">iPhone 15 Pro Max</h3>
                    <div class="flex items-center justify-center sm:justify-start gap-3">
                        <span class="text-lg font-black text-slate-900">32.990.000đ</span>
                        <span class="text-xs text-slate-300 line-through font-bold tracking-tighter">34.990.000đ</span>
                    </div>
                </div>
            </div>
            </div>

        <div class="mt-20 flex flex-col items-center border-t border-gray-100 pt-12">
            <button class="group flex items-center gap-4 px-10 py-4 rounded-full bg-slate-900 text-white font-black text-[11px] uppercase tracking-[0.2em] hover:bg-red-600 transition-all shadow-xl active:scale-95">
                Xem thêm sản phẩm
                <i class="fas fa-chevron-down group-hover:translate-y-1 transition-transform"></i>
            </button>
        </div>

    </main>

    <footer class="py-10 text-center">
        <p class="text-[9px] font-bold text-slate-300 uppercase tracking-[0.8em]">Minimalist Collection © 2026</p>
    </footer>

</body>
</html>
