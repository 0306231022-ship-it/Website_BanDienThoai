<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Săn Flash Sale Trong Ngày</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Ẩn thanh cuộn nhưng vẫn cho phép cuộn ngang */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="group flex items-center gap-2 text-gray-600 hover:text-blue-600 transition-all font-semibold text-sm">
                <svg className="w-5 h-5 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Quay lại
            </a>
            <div class="font-black text-xl tracking-tighter italic"><span class="text-red-600">FLASH</span>SALE</div>
            <div class="w-20"></div> </div>
    </nav>

    <div class="bg-white border-b">
        <div class="max-w-7xl mx-auto">
            <div class="flex overflow-x-auto no-scrollbar py-4 px-4 gap-4">
                
                <button class="flex-shrink-0 w-32 py-3 rounded-2xl bg-gray-100 text-gray-400 cursor-not-allowed">
                    <span class="block text-xl font-black">09:00</span>
                    <span class="text-[10px] uppercase font-bold">Kết thúc</span>
                </button>

                <button class="flex-shrink-0 w-40 py-4 rounded-2xl bg-red-600 text-white shadow-xl shadow-red-200 ring-4 ring-red-50 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform"></div>
                    <span class="relative z-10 block text-2xl font-black">12:00</span>
                    <span class="relative z-10 text-[10px] uppercase font-bold animate-pulse">Đang diễn ra</span>
                </button>

                <button class="flex-shrink-0 w-32 py-3 rounded-2xl bg-white border-2 border-dashed border-gray-200 text-gray-800 hover:border-red-300 transition-all">
                    <span class="block text-xl font-black">15:00</span>
                    <span class="text-[10px] uppercase font-bold text-gray-400">Sắp bắt đầu</span>
                </button>

                <button class="flex-shrink-0 w-32 py-3 rounded-2xl bg-white border-2 border-dashed border-gray-200 text-gray-800 hover:border-red-300 transition-all">
                    <span class="block text-xl font-black">18:00</span>
                    <span class="text-[10px] uppercase font-bold text-gray-400">Sắp bắt đầu</span>
                </button>

                <button class="flex-shrink-0 w-32 py-3 rounded-2xl bg-white border-2 border-dashed border-gray-200 text-gray-800 hover:border-red-300 transition-all">
                    <span class="block text-xl font-black">21:00</span>
                    <span class="text-[10px] uppercase font-bold text-gray-400">Sắp bắt đầu</span>
                </button>

            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="flex items-center justify-between mb-8 flex-wrap gap-4">
            <h2 class="text-2xl font-extrabold flex items-center gap-2">
                Danh sách Deal <span class="text-red-600">Khung giờ 12:00</span>
            </h2>
            <div class="flex items-center gap-3 bg-red-50 px-4 py-2 rounded-full border border-red-100">
                <span class="text-xs font-bold text-red-600 uppercase">Kết thúc sau:</span>
                <div class="flex gap-1 font-mono font-bold text-red-700">
                    <span class="bg-red-200 px-1 rounded">01</span>:
                    <span class="bg-red-200 px-1 rounded">24</span>:
                    <span class="bg-red-200 px-1 rounded">15</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-gray-100 hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 flex flex-col group relative">
                <div class="absolute top-5 right-5 z-10 bg-orange-500 text-white text-xs font-black px-3 py-1 rounded-full shadow-lg">
                    -25%
                </div>
                
                <div class="aspect-square bg-gray-50 rounded-3xl p-6 mb-4 flex items-center justify-center overflow-hidden">
                    <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:358:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/i/p/iphone-15-pro-max_3__1.png" 
                         class="object-contain group-hover:scale-110 transition-transform duration-500" 
                         alt="iPhone">
                </div>

                <div class="flex-1">
                    <h3 class="font-bold text-gray-800 group-hover:text-red-600 transition-colors line-clamp-2 h-10 leading-tight">iPhone 15 Pro Max 256GB - VN/A</h3>
                    
                    <div class="mt-3 flex items-baseline gap-2">
                        <span class="text-2xl font-black text-red-600 leading-none">28.490k</span>
                        <span class="text-xs text-gray-400 line-through italic leading-none">34.990k</span>
                    </div>

                    <div class="mt-4 relative h-5 bg-red-100 rounded-full overflow-hidden border border-red-200">
                        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-red-500 to-orange-500 w-[78%] animate-pulse"></div>
                        <span class="absolute inset-0 flex items-center justify-center text-[9px] font-black text-white uppercase tracking-tighter drop-shadow-sm">🔥 Sắp cháy hàng (78%)</span>
                    </div>
                </div>

                <button class="mt-5 w-full bg-gray-900 text-white py-4 rounded-2xl font-bold text-sm uppercase tracking-widest hover:bg-red-600 hover:shadow-lg hover:shadow-red-200 transition-all active:scale-95">
                    Hốt ngay
                </button>
            </div>

            </div>

        </main>

</body>
</html>
