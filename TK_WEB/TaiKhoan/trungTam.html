<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - PhoneStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white flex rounded-2xl shadow-lg max-w-3xl p-5 items-center">
        
        <div class="md:w-1/2 px-8 md:px-16">
            <h2 class="font-bold text-2xl text-[#e11d48]">Đăng Nhập</h2>
            <p class="text-sm mt-4 text-[#e11d48]">Nếu bạn đã là thành viên, hãy đăng nhập để nhận ưu đãi!</p>

            <form action="#" class="flex flex-col gap-4 mt-8">
                <div class="relative">
                    <input class="p-2 rounded-xl border w-full focus:outline-none focus:border-[#e11d48]" type="email" name="email" placeholder="Email/Số điện thoại">
                </div>
                
                <div class="relative">
                    <input class="p-2 rounded-xl border w-full focus:outline-none focus:border-[#e11d48]" type="password" name="password" placeholder="Mật khẩu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="gray" class="bi bi-eye absolute top-1/2 right-3 -translate-y-1/2 cursor-pointer" viewBox="0 0 16 16">
                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.05-1.44 1.629C11.879 12.5 10.12 13.5 8 13.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                    </svg>
                </div>

                <button class="bg-[#e11d48] rounded-xl text-white py-2 hover:scale-105 duration-300 font-medium">Đăng Nhập</button>
            </form>

            <div class="mt-5 text-xs border-b border-[#e11d48] py-4 text-[#e11d48]">
                <a href="#">Quên mật khẩu?</a>
            </div>

            <div class="mt-3 text-xs flex justify-between items-center text-[#e11d48]">
                <p>Chưa có tài khoản?</p>
                <button class="py-2 px-5 bg-white border border-[#e11d48] rounded-xl hover:scale-110 duration-300">Đăng ký</button>
            </div>
        </div>

        <div class="md:block hidden w-1/2">
            <img class="rounded-2xl" src="https://images.unsplash.com/photo-1616348436168-de43ad0db179?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="Smartphone Promotion">
        </div>

    </div>

</body>
</html>
