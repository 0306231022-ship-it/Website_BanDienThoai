<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin mua hàng - Cửa hàng điện thoại</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Thông Tin Nhận Hàng</h2>
            <p class="text-gray-500 text-sm">Vui lòng kiểm tra kỹ thông tin trước khi xác nhận</p>
        </div>

        <form id="orderForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Tên người nhận</label>
                <input type="text" id="fullname" placeholder="Nguyễn Văn A" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Số điện thoại</label>
                <input type="tel" id="phone" placeholder="090x xxx xxx" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Địa chỉ nhận hàng</label>
                <textarea id="address" rows="3" placeholder="Số nhà, tên đường, Phường/Xã..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"></textarea>
            </div>

            <div class="flex flex-col gap-3 pt-2">
                <button type="button" id="btnDefault"
                    class="flex items-center justify-center gap-2 w-full bg-blue-50 text-blue-600 font-semibold py-2.5 rounded-lg hover:bg-blue-100 active:scale-[0.98] transition">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    Lấy dữ liệu mặc định
                </button>

                <button type="button" id="btnConfirm"
                    class="flex items-center justify-center gap-2 w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-lg shadow-blue-200 active:scale-[0.98] transition">
                    Xác nhận mua hàng
                </button>
            </div>
        </form>
    </div>

    <script>
        // Khởi tạo icon
        lucide.createIcons();

        // Giả lập hàm lấy thông tin người dùng từ câu trước của bạn
        async function LayThongTinNguoiDung() {
            // Giả lập delay API
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve({
                        HoTen: "Trần Văn B",
                        SoDienThoai: "0339876543",
                        DiaChi: "456 Đường Lê Lợi, Quận 1, TP.HCM"
                    });
                }, 500);
            });
        }

        // Xử lý nút Lấy dữ liệu mặc định
        document.getElementById('btnDefault').addEventListener('click', async () => {
            try {
                const data = await LayThongTinNguoiDung();
                document.getElementById('fullname').value = data.HoTen;
                document.getElementById('phone').value = data.SoDienThoai;
                document.getElementById('address').value = data.DiaChi;
            } catch (error) {
                alert("Lỗi khi tải dữ liệu!");
            }
        });

        // Xử lý nút Xác nhận
        document.getElementById('btnConfirm').addEventListener('click', () => {
            const ten = document.getElementById('fullname').value;
            const sdt = document.getElementById('phone').value;
            const dc = document.getElementById('address').value;

            if(!ten || !sdt || !dc) {
                alert("Bạn ơi, nhập thiếu thông tin rồi!");
                return;
            }

            console.log("Dữ liệu gửi đi:", { ten, sdt, dc });
            alert("Đã nhận đơn hàng của " + ten + "!");
        });
    </script>
</body>
</html>
