<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Giỏ hàng trống</title>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-lg text-center mx-4">
        <div class="mb-6">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-red-50 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
            </div>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-3">Giỏ hàng của bạn đang trống</h2>
        <p class="text-gray-500 mb-8 px-4">
            Có vẻ như bạn vẫn chưa chọn được món đồ ưng ý. Đừng lo, hàng ngàn ưu đãi đang chờ bạn khám phá!
        </p>

        <div class="space-y-3">
            <a href="#" class="block w-full py-3 px-6 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-xl transition duration-300">
                Tiếp tục mua sắm
            </a>
            <a href="#" class="block w-full py-3 px-6 bg-white border border-gray-200 hover:bg-gray-50 text-gray-600 font-medium rounded-xl transition duration-300">
                Xem sản phẩm yêu thích
            </a>
        </div>

        <p class="mt-8 text-sm text-gray-400">
            Cần hỗ trợ? <a href="#" class="text-blue-500 hover:underline">Chat với chúng tôi</a>
        </p>
    </div>

</body>
</html>
