<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - PhoneStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white flex flex-row-reverse rounded-2xl shadow-lg max-w-3xl p-5 items-center">
        
        <div class="md:w-1/2 px-8 md:px-12">
            <h2 class="font-bold text-2xl text-[#e11d48]">Tạo Tài Khoản</h2>
            <p class="text-sm mt-3 text-gray-600">Trở thành thành viên để nhận ngay voucher giảm giá 10% cho chiếc điện thoại đầu tiên!</p>

            <form action="#" class="flex flex-col gap-3 mt-6">
                <input class="p-2 rounded-xl border w-full focus:outline-none focus:border-[#e11d48] text-sm" type="text" name="name" placeholder="Họ và tên">
                
                <input class="p-2 rounded-xl border w-full focus:outline-none focus:border-[#e11d48] text-sm" type="tel" name="phone" placeholder="Số điện thoại">

                <input class="p-2 rounded-xl border w-full focus:outline-none focus:border-[#e11d48] text-sm" type="email" name="email" placeholder="Email">
                
                <div class="relative">
                    <input class="p-2 rounded-xl border w-full focus:outline-none focus:border-[#e11d48] text-sm" type="password" name="password" placeholder="Mật khẩu">
                </div>

                <input class="p-2 rounded-xl border w-full focus:outline-none focus:border-[#e11d48] text-sm" type="password" name="confirm_password" placeholder="Xác nhận mật khẩu">

                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="terms" class="accent-[#e11d48]">
                    <label for="terms" class="text-[10px] text-gray-500">Tôi đồng ý với các Điều khoản & Chính sách bảo mật</label>
                </div>

                <button class="bg-[#e11d48] rounded-xl text-white py-2 mt-2 hover:scale-105 duration-300 font-medium shadow-md">Đăng Ký Ngay</button>
            </form>

            <div class="mt-6 text-xs flex justify-between items-center text-[#e11d48]">
                <p class="text-gray-500">Bạn đã có tài khoản?</p>
                <button class="py-2 px-5 bg-white border border-[#e11d48] rounded-xl hover:scale-110 duration-300 font-semibold">Đăng nhập</button>
            </div>
        </div>

        <div class="md:block hidden w-1/2">
            <img class="rounded-2xl h-[500px] w-full object-cover" src="https://images.unsplash.com/photo-1556656793-062ff987b50d?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="New Smartphone">
        </div>

    </div>

</body>
</html>
