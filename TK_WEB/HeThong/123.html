<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo Thương hiệu | TechZ Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#F9FAFB] flex">
<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-300">
        
        <div class="bg-emerald-500 p-8 text-white text-center relative">
            <div class="absolute top-4 right-6 opacity-20 text-6xl rotate-12">
                <i class="fa-solid fa-file-excel"></i>
            </div>
            <div class="w-20 h-20 bg-white/20 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-white/30">
                <i class="fa-solid fa-file-export text-3xl"></i>
            </div>
            <h2 class="text-xl font-bold">Xuất Báo Cáo Dữ Liệu</h2>
            <p class="text-emerald-100 text-sm">Định dạng Microsoft Excel (.xlsx)</p>
        </div>

        <div class="p-8 space-y-6">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 block">Phạm vi dữ liệu</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="range" class="peer hidden" checked>
                        <div class="border-2 border-gray-100 p-3 rounded-xl text-center peer-checked:border-emerald-500 peer-checked:bg-emerald-50 transition">
                            <span class="block font-bold text-sm">Tất cả</span>
                            <span class="text-[10px] text-gray-500">1,284 sản phẩm</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="range" class="peer hidden">
                        <div class="border-2 border-gray-100 p-3 rounded-xl text-center peer-checked:border-emerald-500 peer-checked:bg-emerald-50 transition">
                            <span class="block font-bold text-sm">Trang hiện tại</span>
                            <span class="text-[10px] text-gray-500">50 sản phẩm</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block">Bao gồm thông tin</label>
                <div class="flex flex-wrap gap-2">
                    <span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-medium flex items-center gap-2">
                        <input type="checkbox" checked class="accent-emerald-500"> Giá bán
                    </span>
                    <span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-medium flex items-center gap-2">
                        <input type="checkbox" checked class="accent-emerald-500"> Tồn kho
                    </span>
                    <span class="bg-gray-100 px-3 py-1 rounded-full text-xs font-medium flex items-center gap-2">
                        <input type="checkbox" checked class="accent-emerald-500"> Thông số kỹ thuật
                    </span>
                </div>
            </div>

            <div id="export-progress" class="hidden">
                <div class="flex justify-between text-xs mb-2">
                    <span class="text-emerald-600 font-bold">Đang xử lý dữ liệu...</span>
                    <span class="text-gray-400">80%</span>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                    <div class="bg-emerald-500 h-full w-[80%]"></div>
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <button class="flex-1 px-6 py-3 border-2 border-gray-100 rounded-2xl font-bold text-gray-400 hover:bg-gray-50 transition">Hủy</button>
                <button onclick="startExport()" class="flex-1 px-6 py-3 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-600 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-download"></i> Tải file về
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
