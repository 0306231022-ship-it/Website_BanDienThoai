
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản Lý Flash Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div class="flex h-screen overflow-hidden">

 

        <main class="flex-1 flex flex-col overflow-y-auto">
            
     

            <div class="p-6">
                
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                    <h2 class="text-lg font-semibold border-b pb-3 mb-4">Thông tin chung</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="lg:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tên chiến dịch</label>
                            <input type="text" value="Flash Sale Mừng Lương Về" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Trạng thái</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-green-50 text-green-700 font-medium border-green-200">
                                <option value="active" selected>Đang Bật (Active)</option>
                                <option value="inactive">Đã Tắt (Inactive)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Màu sắc nền (Tùy chọn)</label>
                            <input type="color" value="#ef4444" class="w-full h-[42px] border border-gray-300 rounded-md p-1 cursor-pointer">
                        </div>
                        <div class="lg:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Bắt đầu lúc</label>
                            <input type="datetime-local" value="2026-10-25T20:00" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="lg:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Kết thúc lúc</label>
                            <input type="datetime-local" value="2026-10-25T23:59" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                    <div class="flex justify-between items-center border-b pb-3 mb-4">
                        <h2 class="text-lg font-semibold">Sản phẩm khuyến mãi</h2>
                        <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium transition flex items-center gap-2">
                            + Thêm Sản Phẩm
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-gray-600">
                            <thead class="bg-gray-50 text-gray-700">
                                <tr>
                                    <th class="px-4 py-3 font-medium rounded-tl-md">Sản phẩm</th>
                                    <th class="px-4 py-3 font-medium">Giá Gốc</th>
                                    <th class="px-4 py-3 font-medium">Giá Flash Sale</th>
                                    <th class="px-4 py-3 font-medium w-24">Mở bán</th>
                                    <th class="px-4 py-3 font-medium w-24">Đã bán (Ảo)</th>
                                    <th class="px-4 py-3 font-medium text-right rounded-tr-md">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                
                                <tr class="hover:bg-gray-50 transition">
                                    <td class="px-4 py-3 flex items-center gap-3">
                                        <div class="w-10 h-10 bg-gray-200 rounded flex-shrink-0"></div>
                                        <span class="font-medium text-gray-800 line-clamp-1">iPhone 14 Pro Max 256GB</span>
                                    </td>
                                    <td class="px-4 py-3 line-through text-gray-400">29.990.000đ</td>
                                    <td class="px-4 py-3">
                                        <input type="text" value="24990000" class="w-full border border-gray-300 rounded px-2 py-1 text-red-600 font-bold focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </td>
                                    <td class="px-4 py-3">
                                        <input type="number" value="100" class="w-full border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </td>
                                    <td class="px-4 py-3">
                                        <input type="number" value="80" class="w-full border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </td>
                                    <td class="px-4 py-3 text-right">
                                        <button class="text-blue-600 hover:text-blue-800 mr-3 font-medium">Lưu</button>
                                        <button class="text-red-500 hover:text-red-700 font-medium">Xóa</button>
                                    </td>
                                </tr>

                                <tr class="hover:bg-gray-50 transition">
                                    <td class="px-4 py-3 flex items-center gap-3">
                                        <div class="w-10 h-10 bg-gray-200 rounded flex-shrink-0"></div>
                                        <span class="font-medium text-gray-800 line-clamp-1">Samsung Galaxy S23 Ultra</span>
                                    </td>
                                    <td class="px-4 py-3 line-through text-gray-400">25.990.000đ</td>
                                    <td class="px-4 py-3">
                                        <input type="text" value="16990000" class="w-full border border-gray-300 rounded px-2 py-1 text-red-600 font-bold focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </td>
                                    <td class="px-4 py-3">
                                        <input type="number" value="50" class="w-full border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </td>
                                    <td class="px-4 py-3">
                                        <input type="number" value="30" class="w-full border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </td>
                                    <td class="px-4 py-3 text-right">
                                        <button class="text-blue-600 hover:text-blue-800 mr-3 font-medium">Lưu</button>
                                        <button class="text-red-500 hover:text-red-700 font-medium">Xóa</button>
                                    </td>
                                </tr>

                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="mt-6 flex justify-end">
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-2 rounded-md font-medium mr-3 transition">Hủy</button>
                    <button class="bg-green-600 hover:bg-green-700 text-white px-8 py-2 rounded-md font-medium shadow-md transition">Lưu Chiến Dịch</button>
                </div>

            </div>
        </main>
    </div>
</body>
</html>
